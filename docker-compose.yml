version: '3.8'

services:
  backend:
    build:
      context: ./backend_portfolio
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend_portfolio/.env
    volumes:
      - ./backend_portfolio:/app
    environment:
      - DEBUG=True

  frontend:
    build:
      context: ./frontend_portfolio
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
