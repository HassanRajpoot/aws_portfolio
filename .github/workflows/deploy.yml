# ==============================================================================
# CI/CD Pipeline — App Runner + S3/CloudFront (OIDC Auth)
#
# Architecture:
#   Frontend: Vite build → S3 → CloudFront
#   Backend:  Docker image → ECR → App Runner (auto-deploy)
#   Auth:     GitHub OIDC (keyless — no stored AWS credentials)
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN           - IAM Role ARN for OIDC authentication
#
# Required GitHub Variables:
#   AWS_REGION             - e.g. eu-west-1
#   ECR_REPOSITORY         - e.g. portfolio-backend
#   S3_BUCKET_NAME         - e.g. portfolio-frontend-123456789
#   CLOUDFRONT_DISTRIBUTION_ID - e.g. E1234567890ABC
#   APPRUNNER_SERVICE_ARN  - e.g. arn:aws:apprunner:eu-west-1:123456789:service/...
#   VITE_API_URL           - e.g. https://xxxx.eu-west-1.awsapprunner.com/api/v1
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'backend_portfolio/**'
      - 'frontend_portfolio/**'
      - '.github/workflows/**'

# Prevent overlapping deployments — cancel the in-progress run if a new push
# arrives on main.  Without this, two simultaneous deploys can corrupt S3 or
# race on App Runner, leaving the site in a half-updated state.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Required for OIDC authentication with AWS
permissions:
  id-token: write
  contents: read

jobs:
  # ============================================================================
  # Job 1: Run Django Tests
  # ============================================================================
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_portfolio
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend_portfolio/requirements.txt

      - name: Run Backend Tests
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_portfolio
          SECRET_KEY: 'test-secret-key-for-ci-cd'
          DEBUG: 'True'
        run: |
          cd backend_portfolio
          python manage.py test

  # ============================================================================
  # Job 2: Build & Push Backend Docker Image to ECR
  # ============================================================================
  build-and-push-ecr:
    name: Build & Push to ECR
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ECR (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: backend_portfolio
          file: backend_portfolio/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
          # Cache Docker layers in ECR — subsequent builds skip unchanged layers.
          # This cuts build time from ~3-4 min to ~30-60s for code-only changes.
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:cache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:cache,mode=max

      - name: Verify image exists in ECR
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "🔍 Verifying image was pushed successfully..."
          aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --image-ids imageTag=$IMAGE_TAG \
            --query 'imageDetails[0].imagePushedAt' \
            --output text
          echo "✅ Image verified in ECR"

  # ============================================================================
  # Job 3: Deploy Backend via App Runner
  # ============================================================================
  deploy-backend:
    name: Deploy Backend (App Runner)
    needs: build-and-push-ecr
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Check App Runner service is in a deployable state
        run: |
          STATUS=$(aws apprunner describe-service \
            --service-arn ${{ vars.APPRUNNER_SERVICE_ARN }} \
            --query 'Service.Status' \
            --output text)

          echo "📋 Current App Runner status: $STATUS"

          # App Runner can only accept a new deployment when RUNNING.
          # If it's in OPERATION_IN_PROGRESS, a previous deploy is still going.
          if [ "$STATUS" = "OPERATION_IN_PROGRESS" ]; then
            echo "⏳ A deployment is already in progress. Waiting for it to finish..."
            MAX_WAIT=300
            ELAPSED=0
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              sleep 15
              ELAPSED=$((ELAPSED + 15))
              STATUS=$(aws apprunner describe-service \
                --service-arn ${{ vars.APPRUNNER_SERVICE_ARN }} \
                --query 'Service.Status' \
                --output text)
              echo "  Status: $STATUS (${ELAPSED}s elapsed)"
              if [ "$STATUS" = "RUNNING" ]; then
                echo "✅ Previous deployment finished."
                break
              elif echo "$STATUS" | grep -qE "FAILED|DELETED"; then
                echo "❌ Service is in a failed state: $STATUS"
                exit 1
              fi
            done
            if [ "$STATUS" != "RUNNING" ]; then
              echo "❌ Timed out waiting for previous deployment to finish."
              exit 1
            fi
          elif echo "$STATUS" | grep -qE "FAILED|DELETED"; then
            echo "❌ Service is in a non-deployable state: $STATUS"
            echo "   Manual intervention required in the AWS Console."
            exit 1
          fi

      - name: Trigger App Runner deployment
        id: trigger-deploy
        run: |
          echo "🚀 Triggering App Runner deployment..."
          OPERATION_ID=$(aws apprunner start-deployment \
            --service-arn ${{ vars.APPRUNNER_SERVICE_ARN }} \
            --query 'OperationId' \
            --output text 2>&1) || {
            echo "❌ Failed to trigger deployment."
            echo "   Error: $OPERATION_ID"
            echo "   This can happen if the service is in a transitional state."
            exit 1
          }
          echo "operation_id=$OPERATION_ID" >> $GITHUB_OUTPUT
          echo "📝 Operation ID: $OPERATION_ID"

      - name: Wait for deployment to complete
        run: |
          echo "⏳ Waiting for App Runner deployment to stabilize..."
          MAX_WAIT=600  # 10 minutes (images with migrations can be slow)
          ELAPSED=0
          INTERVAL=15
          LAST_STATUS=""

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(aws apprunner describe-service \
              --service-arn ${{ vars.APPRUNNER_SERVICE_ARN }} \
              --query 'Service.Status' \
              --output text)

            # Only log when status changes to reduce noise
            if [ "$STATUS" != "$LAST_STATUS" ]; then
              echo "  Status: $STATUS (${ELAPSED}s elapsed)"
              LAST_STATUS="$STATUS"
            fi

            if [ "$STATUS" = "RUNNING" ]; then
              echo "✅ App Runner deployment successful!"
              exit 0
            fi

            # Catch ALL App Runner failure states
            if echo "$STATUS" | grep -qE "CREATE_FAILED|UPDATE_FAILED|DELETE_FAILED"; then
              echo ""
              echo "❌ Deployment FAILED with status: $STATUS"
              echo ""
              echo "--- Service Details ---"
              aws apprunner describe-service \
                --service-arn ${{ vars.APPRUNNER_SERVICE_ARN }} \
                --query 'Service.{Status:Status,UpdatedAt:UpdatedAt,ServiceUrl:ServiceUrl}' \
                --output table
              echo ""
              echo "💡 Common causes:"
              echo "   - Container fails health check at /health/"
              echo "   - Missing or invalid environment variables"
              echo "   - Application crash on startup (check App Runner logs)"
              echo ""
              echo "🔗 Check logs: https://console.aws.amazon.com/apprunner"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo ""
          echo "⏰ Timeout: deployment did not stabilize within ${MAX_WAIT}s"
          echo "   Last status: $LAST_STATUS"
          echo "   The deployment may still be in progress."
          echo "   Check App Runner console for current status."
          exit 1

      - name: Verify backend health
        run: |
          # Get the service URL to hit the health endpoint
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn ${{ vars.APPRUNNER_SERVICE_ARN }} \
            --query 'Service.ServiceUrl' \
            --output text)

          echo "🏥 Running health check against https://${SERVICE_URL}/health/ ..."

          # Retry health check up to 5 times with 10s intervals.
          # App Runner may report RUNNING before the container is fully ready.
          MAX_RETRIES=5
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "https://${SERVICE_URL}/health/" 2>/dev/null) || HTTP_STATUS="000"

            echo "  Attempt $((RETRY + 1))/$MAX_RETRIES: HTTP $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi

            RETRY=$((RETRY + 1))
            if [ $RETRY -lt $MAX_RETRIES ]; then
              echo "  Retrying in 10s..."
              sleep 10
            fi
          done

          echo ""
          echo "❌ Health check FAILED after $MAX_RETRIES attempts"
          echo "   URL: https://${SERVICE_URL}/health/"
          echo "   Last HTTP status: $HTTP_STATUS"
          echo ""
          echo "💡 The container is running but the app may have crashed."
          echo "   Check App Runner application logs for errors."
          exit 1

  # ============================================================================
  # Job 4: Build & Deploy Frontend to S3 + Invalidate CloudFront
  # ============================================================================
  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend_portfolio/package-lock.json

      - name: Install dependencies & build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          cd frontend_portfolio
          npm ci
          npm run build

          # Verify the build produced output
          if [ ! -f dist/index.html ]; then
            echo "❌ Build failed: dist/index.html not found"
            echo "   The Vite build did not produce expected output."
            ls -la dist/ 2>/dev/null || echo "   dist/ directory does not exist"
            exit 1
          fi

          FILE_COUNT=$(find dist -type f | wc -l)
          echo "✅ Build successful: $FILE_COUNT files in dist/"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify S3 bucket is accessible
        run: |
          aws s3 ls s3://${{ vars.S3_BUCKET_NAME }}/ > /dev/null 2>&1 || {
            echo "❌ Cannot access S3 bucket: ${{ vars.S3_BUCKET_NAME }}"
            echo "   Check that the bucket exists and the IAM role has s3:ListBucket permission."
            exit 1
          }
          echo "✅ S3 bucket is accessible"

      - name: Sync to S3
        run: |
          echo "📤 Uploading hashed assets (1-year cache)..."
          aws s3 sync frontend_portfolio/dist/ s3://${{ vars.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"

          echo "📤 Uploading index.html (no-cache)..."
          aws s3 cp frontend_portfolio/dist/index.html s3://${{ vars.S3_BUCKET_NAME }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

          # Upload any JSON manifests with short cache
          find frontend_portfolio/dist -name "*.json" -type f | while read -r json_file; do
            RELATIVE_PATH="${json_file#frontend_portfolio/dist/}"
            echo "📤 Uploading $RELATIVE_PATH (short cache)..."
            aws s3 cp "$json_file" "s3://${{ vars.S3_BUCKET_NAME }}/$RELATIVE_PATH" \
              --cache-control "public, max-age=0, must-revalidate"
          done

      - name: Verify S3 deployment
        run: |
          echo "🔍 Verifying index.html exists in S3..."
          aws s3api head-object \
            --bucket ${{ vars.S3_BUCKET_NAME }} \
            --key index.html \
            --query '{ContentType:ContentType,ContentLength:ContentLength,LastModified:LastModified}' \
            --output table || {
            echo "❌ index.html not found in S3 after upload!"
            echo "   The S3 sync may have failed silently."
            exit 1
          }
          echo "✅ S3 deployment verified"

      - name: Invalidate CloudFront cache
        id: invalidation
        run: |
          echo "🔄 Creating CloudFront invalidation..."
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text 2>&1) || {
            echo "⚠️  CloudFront invalidation failed: $INVALIDATION_ID"
            echo "   The new files are in S3, but users may see cached content"
            echo "   until the default TTL expires."
            echo "   You can manually invalidate via the CloudFront console."
            # Don't exit 1 — the deployment itself succeeded, only the cache
            # invalidation failed.  Users will eventually get the new version.
            exit 0
          }
          echo "invalidation_id=$INVALIDATION_ID" >> $GITHUB_OUTPUT
          echo "✅ Invalidation submitted: $INVALIDATION_ID"

  # ============================================================================
  # Job 5: Notify on failure
  #
  # Uses `always()` + manual failure check instead of `failure()` alone.
  # `failure()` can miss failures in skipped jobs. This approach inspects
  # the result of each upstream job explicitly.
  # ============================================================================
  notify-failure:
    name: Notify on Failure
    needs: [test-backend, build-and-push-ecr, deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    if: always() && contains(needs.*.result, 'failure')

    steps:
      - name: Determine which job failed
        id: failed-jobs
        run: |
          FAILED=""
          if [ "${{ needs.test-backend.result }}" = "failure" ]; then
            FAILED="${FAILED}• Backend Tests\n"
          fi
          if [ "${{ needs.build-and-push-ecr.result }}" = "failure" ]; then
            FAILED="${FAILED}• ECR Build & Push\n"
          fi
          if [ "${{ needs.deploy-backend.result }}" = "failure" ]; then
            FAILED="${FAILED}• Backend Deployment (App Runner)\n"
          fi
          if [ "${{ needs.deploy-frontend.result }}" = "failure" ]; then
            FAILED="${FAILED}• Frontend Deployment (S3/CloudFront)\n"
          fi
          echo "failed_list<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FAILED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send failure notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ CI/CD Pipeline Failed — ${{ github.repository }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: "GitHub Actions <noreply@github.com>"
          body: |
            The CI/CD pipeline failed for:

              Commit:  ${{ github.sha }}
              Branch:  ${{ github.ref_name }}
              Author:  ${{ github.actor }}
              Message: ${{ github.event.head_commit.message }}

            Failed jobs:
            ${{ steps.failed-jobs.outputs.failed_list }}

            View build details:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
