name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'backend_portfolio/**'
      - 'frontend_portfolio/**'
      - '.github/workflows/**'

jobs:
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_portfolio
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend_portfolio/requirements.txt

      - name: Run Backend Tests
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_portfolio
          SECRET_KEY: 'test-secret-key-for-ci-cd'
          DEBUG: 'True'
        run: |
          cd backend_portfolio
          python manage.py test

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI/CD Pipeline Failed: Backend Tests"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: "GitHub Actions <noreply@github.com>"
          body: |
            Backend tests failed for commit ${{ github.sha }} on branch ${{ github.ref_name }}.
            
            View build details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build-and-push-ecr:
    name: Build & Push Backend to ECR
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest backend_portfolio/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI/CD Pipeline Failed: ECR Push"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: "GitHub Actions <noreply@github.com>"
          body: |
            Building or pushing the backend Docker image to ECR failed for commit ${{ github.sha }} on branch ${{ github.ref_name }}.
            
            View build details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy:
    name: Deploy to EC2
    needs: build-and-push-ecr
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      ECR_REGISTRY: ${{ needs.build-and-push-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend_portfolio/package-lock.json

      - name: Install Frontend Dependencies & Build
        run: |
          cd frontend_portfolio
          npm ci
          npm run build

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Frontend Build via Rsync
        run: |
          rsync -avz --delete frontend_portfolio/dist/ ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:${{ secrets.DEPLOY_PATH_FRONTEND }}

      - name: Deploy Backend Container on EC2
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "
            # Login to ECR on EC2 host using temporary credentials passed from GitHub Actions
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY
            
            # Pull the latest image
            docker pull $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:latest
            
            # Stop and remove old container if it exists
            docker stop backend-app || true
            docker rm backend-app || true
            
            # Run new container
            docker run -d \
              --name backend-app \
              -p 8000:8000 \
              --restart always \
              --env-file ${{ secrets.DEPLOY_PATH_BACKEND }}/.env \
              $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:latest
            
            # Run migrations inside the newly started container
            docker exec backend-app python manage.py migrate --noinput
          "

      - name: Send Email on Deployment Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI/CD Pipeline Failed: Deployment"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: "GitHub Actions <noreply@github.com>"
          body: |
            Deployment to EC2 failed for commit ${{ github.sha }} on branch ${{ github.ref_name }}.
            
            View build details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
